name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infrastructure/terraform

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Python unit tests
        working-directory: infrastructure/lambdas
        run: |
          python3 -m pip install -r tests/requirements.txt --quiet
          python3 -m pytest tests/unit -q

      - name: Package Lambda artifacts
        run: bash infrastructure/lambdas/package.sh

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="dynamodb_table=mb-terraform-locks"

      - name: Select staging workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform workspace select staging || terraform workspace new staging

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -no-color -var-file=environments/staging.tfvars -out=tfplan

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan (staging)
            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Python unit tests
        working-directory: infrastructure/lambdas
        run: |
          python3 -m pip install -r tests/requirements.txt --quiet
          python3 -m pytest tests/unit -q

      - name: Package Lambda artifacts
        run: bash infrastructure/lambdas/package.sh

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="dynamodb_table=mb-terraform-locks"

      - name: Select staging workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform workspace select staging || terraform workspace new staging

      - name: Terraform apply staging
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve -var-file=environments/staging.tfvars

      - name: Integration tests (Newman)
        continue-on-error: true
        run: |
          npm install -g newman
          python3 -m pip install -r infrastructure/scripts/requirements.txt --quiet
          python3 infrastructure/scripts/seed.py --env staging --count 20
          newman run infrastructure/postman/MeditationBuilder.postman_collection.json \
            -e infrastructure/postman/staging.postman_environment.json \
            --reporters cli

  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Python unit tests
        working-directory: infrastructure/lambdas
        run: |
          python3 -m pip install -r tests/requirements.txt --quiet
          python3 -m pytest tests/unit -q

      - name: Package Lambda artifacts
        run: bash infrastructure/lambdas/package.sh

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="dynamodb_table=mb-terraform-locks"

      - name: Select production workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform workspace select production || terraform workspace new production

      - name: Terraform apply production
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve -var-file=environments/production.tfvars
